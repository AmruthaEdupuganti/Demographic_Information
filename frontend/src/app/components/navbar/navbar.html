<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand">
      <span class="brand-icon">&#x1F6E1;</span>
      <span class="brand-text">PolicyGuard</span>
    </a>


    <div class="navbar-links" [class.open]="mobileMenuOpen()">
      @if (authService.isAuthenticated()) {
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-link" (click)="mobileMenuOpen.set(false)">
          <span class="nav-icon">&#x1F4CB;</span> Dashboard
        </a>
        <div class="nav-divider"></div>
        <button class="btn btn-outline nav-logout" (click)="logout()">
          <span class="nav-icon">&#x2192;</span> Logout
        </button>
      } @else {
        <a routerLink="/login" routerLinkActive="active" class="nav-link" (click)="mobileMenuOpen.set(false)">Login</a>
        <a routerLink="/register" class="btn btn-primary nav-cta" (click)="mobileMenuOpen.set(false)">Get Insured</a>
      }
    </div>

  </div>
</nav>
